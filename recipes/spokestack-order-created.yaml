name: order-created-notification
description: Notify when a new order is placed
version: "1.0"
trigger:
  type: webhook
  event: entity.event
  source: spokestack-core
  filters:
    entityType: Order
    action: created

variables:
  order_id: "{{ trigger.payload.entityId }}"
  org_id: "{{ trigger.payload.organizationId }}"

steps:
  - id: fetch_order
    type: api_call
    config:
      method: GET
      url: "{{ env.SPOKESTACK_CORE_URL }}/api/v1/orders/{{ order_id }}"
      headers:
        X-API-Key: "{{ env.SPOKESTACK_API_KEY }}"
        X-Org-Id: "{{ org_id }}"

  - id: fetch_client
    type: api_call
    config:
      method: GET
      url: "{{ env.SPOKESTACK_CORE_URL }}/api/v1/clients/{{ steps.fetch_order.result.clientId }}"
      headers:
        X-API-Key: "{{ env.SPOKESTACK_API_KEY }}"
        X-Org-Id: "{{ org_id }}"
    conditions:
      - "{{ steps.fetch_order.result.clientId }}"

  - id: format_message
    type: transform
    config:
      template: |
        🛒 *New Order*

        {% if steps.fetch_client.result %}
        Client: {{ steps.fetch_client.result.name }}
        {% endif %}
        {% if steps.fetch_order.result.total %}
        Total: ${{ steps.fetch_order.result.total }}
        {% endif %}
        Items: {{ steps.fetch_order.result.items | length | default(0) }}

        Review the order in SpokeStack.

  - id: get_owner
    type: api_call
    config:
      method: GET
      url: "{{ env.SPOKESTACK_CORE_URL }}/api/v1/members?role=OWNER"
      headers:
        X-API-Key: "{{ env.SPOKESTACK_API_KEY }}"
        X-Org-Id: "{{ org_id }}"

  - id: notify_owner
    type: send_message
    config:
      channel: whatsapp
      to: "{{ steps.get_owner.result[0].phone }}"
      message: "{{ steps.format_message.result }}"
    conditions:
      - "{{ steps.get_owner.result[0].phone }}"

marketplace:
  id: recipe-order-created-v1
  creator: agentvbx
  title: "New Order Notification"
  description: "Sends a WhatsApp notification to the org owner when a new order is placed. Includes client name, order total, and item count."
  category: operations
  tags:
    - order
    - notifications
    - commerce
  version: "1.0"
  required_tools:
    - spokestack
  pricing:
    type: free
